<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SplitUp Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        :root {
            --bg-color: #f4f6fa;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --text-main: #0f172a;
            --text-gray: #64748b;
            --accent-blue: #007aff;
            --accent-amber: #f59e0b;
            --accent-red: #ef4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            margin: 0; padding: 0; display: flex; flex-direction: column;
            height: 100vh; box-sizing: border-box; user-select: none; overflow: hidden;
            position: relative;
        }
        .slider-container { width: 100%; height: 100%; overflow: hidden; position: relative; z-index: 10; }
        .slider-wrapper { display: flex; width: 300%; height: 100%; transition: transform 0.32s cubic-bezier(0.25, 1, 0.5, 1); will-change: transform; }
        .screen { width: 33.3333%; height: 100%; display: flex; flex-direction: column; align-items: center; padding: 16px 14px 85px 14px; overflow-y: auto; box-sizing: border-box; flex-shrink: 0; -webkit-overflow-scrolling: touch; }
        h1 { font-size: 22px; margin: 5px 0 20px 0; font-weight: 800; letter-spacing: -0.5px; text-align: center; }
        .circle-outer { position: relative; width: 220px; height: 220px; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; flex-shrink: 0; }
        
        .circle-container { 
            position: relative; width: 165px; height: 165px; border-radius: 50%; 
            background: #e0f2fe; overflow: hidden;
            box-shadow: 0 12px 30px rgba(0, 122, 255, 0.2), inset 0 0 0 2px rgba(0, 122, 255, 0.25); 
            border: none; z-index: 5; display: flex; justify-content: center; align-items: center; 
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        
        /* СИНХРОННЫЙ ОКЕАН (ОБЕ ВОЛНЫ ДВИГАЮТСЯ) */
        .liquid-water { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, #007aff, #00c7ff); transition: height 0.75s ease-out; z-index: 10; }
        .wave-back, .wave-front { position: absolute; width: 280px; height: 280px; bottom: 82%; left: 50%; border-radius: 43%; transform: translateX(-50%) rotate(0deg); }
        .wave-back { background: rgba(255, 255, 255, 0.23); animation: ChurnBack 7s linear infinite; z-index: 11; }
        .wave-front { background: rgba(0, 122, 255, 0.15); border-radius: 40%; animation: ChurnFront 10s linear infinite; bottom: 85%; z-index: 12; }
        
        @keyframes ChurnBack { 0% { transform: translateX(-50%) rotate(0deg); } 100% { transform: translateX(-50%) rotate(360deg); } }
        @keyframes ChurnFront { 0% { transform: translateX(-50%) rotate(0deg); } 100% { transform: translateX(-50%) rotate(-360deg); } }

        .free-money-box { text-align: center; margin: 5px 0 20px 0; flex-shrink: 0; }
        .free-money-box .value { font-size: 28px; font-weight: 850; color: var(--accent-blue); letter-spacing: -0.5px; }
        .free-money-box .label { font-size: 12px; color: var(--text-gray); font-weight: 600; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.3px; }
        .plan-container { width: 100%; max-width: 380px; display: flex; flex-direction: column; }
        .zone-header { font-size: 13px; color: var(--text-gray); font-weight: 700; text-align: center; margin: 15px 0 10px 0; text-transform: uppercase; }
        .zone-list { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-bottom: 10px; }
        .plan-card { background: var(--card-bg); border: 1px solid var(--card-border); padding: 12px 14px; border-radius: 14px; display: flex; flex-direction: column; box-shadow: 0 2px 6px rgba(0,0,0,0.01); }
        .plan-card.priority { border: 1px solid rgba(239,68,68,0.22); }
        .plan-card .row-main { display: flex; justify-content: space-between; font-weight: 700; font-size: 14px; }
        .plan-card .row-sub { font-size: 12px; color: var(--text-gray); margin-top: 3px; }

        .form-box { width: 100%; max-width: 380px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 12px; box-sizing: border-box; margin-bottom: 12px; position: relative; z-index: 20; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .form-box h3 { margin: 0 0 10px 0; font-size: 13px; text-transform: uppercase; color: var(--text-main); font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
        
        /* ЖЕЛЕЗНЫЙ ФИКС ВЕРСТКИ СТРОК ДЛЯ ОДНОРОДНОГО РЯДА */
        .table-head { display: flex; gap: 8px; margin-bottom: 6px; padding: 0 4px; font-size: 10px; color: var(--text-gray); font-weight: 700; text-transform: uppercase; box-sizing: border-box; width: 100%; }
        .list-item-row { display: flex; gap: 8px; margin-bottom: 8px; width: 100%; align-items: center; box-sizing: border-box; }
        
        .list-item-row .f-name, .th-name { flex: 2; min-width: 0; }
        .list-item-row .f-sum, .th-sum { width: 85px; flex-shrink: 1; min-width: 0; }
        .list-item-row .f-time, .th-time { width: 45px; text-align: center; flex-shrink: 0; }
        .list-item-row .f-pct, .th-pct { width: 50px; text-align: center; flex-shrink: 0; }
        .th-toggle, .list-item-row .f-toggle, .toggle-btn { width: 55px; text-align: center; flex-shrink: 0; }
        .th-space, .btn-delete { width: 24px; text-align: center; flex-shrink: 0; }

        .input-inline { display: flex; gap: 10px; margin-bottom: 8px; align-items: center; justify-content: space-between; }
        .input-inline label { font-size: 13px; font-weight: 600; }
        .input-inline input { width: 55px; background: var(--bg-color); border: 1px solid var(--card-border); border-radius: 6px; padding: 6px; text-align: center; font-size: 13px; outline: none; font-weight: 600; }
        .input-inline input:disabled { opacity: 0.35; background: #e2e8f0; }

        .list-item-row input { background: var(--bg-color); border: 1px solid var(--card-border); border-radius: 8px; padding: 9px; color: var(--text-main); font-size: 13px; outline: none; box-sizing: border-box; font-weight: 500; height: 36px; }
        .list-item-row input:focus { border-color: var(--accent-blue); background: #ffffff; }
        .list-item-row input:disabled { background: #e2e8f0 !important; font-weight: 700; opacity: 0.85; }

        .toggle-btn { width: 55px; height: 34px; border-radius: 8px; border: 1px solid var(--card-border); background: var(--bg-color); color: var(--text-gray); font-size: 11px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; outline: none; transition: all 0.2s ease; box-sizing: border-box; }
        .toggle-btn.active-sal { background: var(--accent-blue) !important; color: #fff !important; border-color: var(--accent-blue) !important; }
        .toggle-btn.active-adv { background: var(--accent-amber) !important; color: #fff !important; border-color: var(--accent-amber) !important; }

        .btn-delete { background: none; border: none; color: var(--text-gray); font-size: 15px; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; flex-shrink: 0; position: relative; z-index: 30; }
        .btn-action { width: 100%; max-width: 380px; padding: 12px; border-radius: 12px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; position: relative; z-index: 30; }
        .btn-save { background: var(--accent-blue); color: #fff; }
        .btn-add { background: none; border: none; color: var(--accent-blue); font-weight: 700; font-size: 12px; cursor: pointer; }
        .page-dots { position: fixed; bottom: 18px; left: 0; width: 100%; height: 10px; display: flex; justify-content: center; gap: 8px; z-index: 100; pointer-events: none; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: #cbd5e1; transition: background 0.25s, transform 0.25s; }
        .dot.active { background: var(--accent-blue); transform: scale(1.2); }
    </style>
</head>
<body>
    <div class="slider-container" onclick="handleBackgroundClick(event)">
        <div class="slider-wrapper" id="sliderWrapper">
            <!-- ЭКРАН 1 -->
            <div class="screen">
                <h1>SplitUp</h1>
                <div class="circle-outer">
                    <div class="circle-container" id="coreCircle">
                        <div class="liquid-water" id="waterLayer">
                            <div class="wave-back"></div>
                            <div class="wave-front"></div>
                        </div>
                    </div>
                </div>
                <div class="free-money-box">
                    <div class="value" id="freeMoneyText">0 ₽</div>
                    <div class="label">Всего свободных денег</div>
                </div>
                <div class="plan-container" onclick="event.stopPropagation()"><div id="calendarPlanList"></div></div>
            </div>
            <!-- ЭКРАН 2 -->
            <div class="screen">
                <h1>Потоки финансов</h1>
                <div class="form-box" onclick="event.stopPropagation()">
                    <h3>Даты выплат</h3>
                    <div class="input-inline"><label>Число Зарплаты:</label><input type="number" id="dateSalary" min="1" max="31"></div>
                    <div class="input-inline"><label>Число Аванса:</label><input type="number" id="dateAdvance" min="1" max="31"></div>
                </div>
                <div class="form-box" onclick="event.stopPropagation()">
                    <h3>Доходы <button class="btn-add" onclick="addItem('incomes')">+ Добавить</button></h3>
                    <div class="table-head"><span class="th-name">Откуда деньги?</span><span class="th-sum">Сумма</span><span class="th-space"></span></div>
                    <div id="incomesContainer"></div>
                </div>
                <div class="form-box" onclick="event.stopPropagation()">
                    <h3>Расходы и Долги <button class="btn-add" onclick="addItem('expenses')">+ Добавить</button></h3>
                    <div class="table-head"><span class="th-name">Название долга</span><span class="th-sum">Сумма</span><span class="th-time">Срок</span><span class="th-toggle">Привязка</span><span class="th-space"></span></div>
                    <div id="expensesContainer"></div>
                </div>
                <button class="btn-action btn-save" onclick="event.stopPropagation(); saveAllData()">Сохранить расчет</button>
            </div>
            <!-- ЭКРАН 3 -->
            <div class="screen">
                <h1>Умная копилка</h1>
                <div class="form-box" onclick="event.stopPropagation()">
                    <h3>Параметры сейфа</h3>
                    <div class="input-inline"><label>Фиксированный % от остатка:</label><input type="number" id="piggyGlobalPercent" min="0" max="100"></div>
                </div>
                <div class="form-box" onclick="event.stopPropagation()">
                    <h3>Цели накоплений <button class="btn-add" onclick="addItem('targets')">+ Создать цель</button></h3>
                    <div class="table-head"><span class="th-name">На что копим?</span><span class="th-pct">Процент</span><span class="th-toggle">Привязка</span><span class="th-space"></span></div>
                    <div id="targetsContainer"></div>
                </div>
                <button class="btn-action btn-save" onclick="event.stopPropagation(); saveAllData()">Сохранить копилку</button>
            </div>
        </div>
    </div>
    <div class="page-dots"><div id="dot-0" class="dot active"></div><div id="dot-1" class="dot"></div><div id="dot-2" class="dot"></div></div>
    <script>
        // Обновили базу до splitup_v16_db для полной очистки старого зависшего кэша Safari
        let appData = JSON.parse(localStorage.getItem('splitup_v16_db')) || {
            salaryDate: 15, advanceDate: 30, piggyPercent: 15,
            incomes: [{ name: "Зарплата", sum: 70000, fixed: true }, { name: "Аванс", sum: 30000, fixed: true }],
            expenses: [{ name: "Кредит", sum: 40000, months: 2, source: "sal" }, { name: "ЖКХ", sum: 5000, months: 1, source: "adv" }],
            targets: [] 
        };
        let currentIdx = 0; const wrapper = document.getElementById('sliderWrapper');

        function handleBackgroundClick(event) { if (document.activeElement.tagName === 'INPUT') return; if (event.clientX > window.innerWidth / 2) movePage(1); else movePage(-1); }
        function movePage(dir) { let next = currentIdx + dir; if (next >= 0 && next <= 2) setPage(next); }
        function setPage(idx) { currentIdx = idx; wrapper.style.transform = 'translateX(-' + (idx * 33.3333) + '%)'; document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx)); if(idx !== 0) renderForms(); }
        
        function toggleSource(type, index) {
            let current = appData[type][index].source || 'sal';
            appData[type][index].source = (current === 'sal') ? 'adv' : 'sal';
            renderForms();
        }

        function renderForms() {
            document.getElementById('dateSalary').value = appData.salaryDate; document.getElementById('dateAdvance').value = appData.advanceDate;
            const pInput = document.getElementById('piggyGlobalPercent'); pInput.value = appData.piggyPercent; pInput.disabled = appData.targets.length > 0;
            
            let incHTML = '';
            for(let i=0; i<appData.incomes.length; i++) { let item = appData.incomes[i]; incHTML += '<div class="list-item-row"><input type="text" class="f-name" value="' + item.name + '" ' + (item.fixed ? 'disabled' : 'oninput="appData.incomes['+i+'].name=this.value"') + '><input type="number" class="f-sum" value="' + item.sum + '" oninput="appData.incomes['+i+'].sum=Number(this.value)">' + (item.fixed ? '<span style="width:24px;flex-shrink:0;"></span>' : '<button class="btn-delete" onclick="deleteItem(\'incomes\','+i+')">✕</button>') + '</div>'; }
            document.getElementById('incomesContainer').innerHTML = incHTML;
            
            let expHTML = '';
            for(let i=0; i<appData.expenses.length; i++) { 
                let item = appData.expenses[i]; let src = item.source || 'sal';
                let btnClass = (src === 'sal') ? 'toggle-btn active-sal' : 'toggle-btn active-adv';
                let btnText = (src === 'sal') ? 'ЗП' : 'АВН';
                expHTML += '<div class="list-item-row" style="' + (i===0 ? 'border-left:3px solid var(--accent-red);padding-left:4px;' : '') + '"><input type="text" class="f-name" value="' + item.name + '" oninput="appData.expenses['+i+'].name=this.value"><input type="number" class="f-sum" value="' + item.sum + '" oninput="appData.expenses['+i+'].sum=Number(this.value)"><input type="number" class="f-time" value="' + (item.months||1) + '" oninput="appData.expenses['+i+'].months=Number(this.value)"><button class="' + btnClass + '" onclick="toggleSource(\'expenses\','+i+')">' + btnText + '</button><button class="btn-delete" onclick="deleteItem(\'expenses\','+i+')">✕</button></div>'; 
            }
            document.getElementById('expensesContainer').innerHTML = expHTML;
            
            let trgHTML = '';
            for(let i=0; i<appData.targets.length; i++) { 
                let item = appData.targets[i]; let src = item.source || 'sal';
                let btnClass = (src === 'sal') ? 'toggle-btn active-sal' : 'toggle-btn active-adv';
                let btnText = (src === 'sal') ? 'ЗП' : 'АВН';
                trgHTML += '<div class="list-item-row"><input type="text" class="f-name" value="' + item.name + '" oninput="appData.targets['+i+'].name=this.value"><input type="number" class="f-pct" value="' + item.pct + '" oninput="appData.targets['+i+'].pct=Number(this.value)"><button class="' + btnClass + '" onclick="toggleSource(\'targets\','+i+')">' + btnText + '</button><button class="btn-delete" onclick="deleteItem(\'targets\','+i+')">✕</button></div>'; 
            }
            document.getElementById('targetsContainer').innerHTML = trgHTML;
        }
        function addItem(type) { if (type === 'incomes') appData.incomes.push({ name: '', sum: 0 }); else if (type === 'expenses') appData.expenses.push({ name: '', sum: 0, months: 1, source: 'sal' }); else appData.targets.push({ name: '', pct: 5, source: 'sal' }); renderForms(); }
        function deleteItem(type, i) { appData[type].splice(i, 1); renderForms(); }
        function saveAllData() { appData.salaryDate = Number(document.getElementById('dateSalary').value) || 15; appData.advanceDate = Number(document.getElementById('dateAdvance').value) || 30; if (appData.targets.length === 0) appData.piggyPercent = Number(document.getElementById('piggyGlobalPercent').value) || 15; localStorage.setItem('splitup_v16_db', JSON.stringify(appData)); calculateBudget(); setPage(0); }
        function calculateBudget() {
            let salCash = appData.incomes.find(i => i.name === "Зарплата")?.sum || 0;
            let advCash = appData.incomes.find(i => i.name === "Аванс")?.sum || 0;
            let extraIncomes = appData.incomes.filter(i => !i.fixed).reduce((acc, c) => acc + (c.sum || 0), 0);
            
            let salTotalIncome = salCash + extraIncomes; let advTotalIncome = advCash;
            let salListHTML = ''; let advListHTML = ''; let salExpensesSum = 0; let advExpensesSum = 0;
            let totalExpenseThisMonth = 0; // Полностью исправлено объявление переменной

            for(let i=0; i<appData.expenses.length; i++) {
                let item = appData.expenses[i]; let m = Number(item.months) || 1; if (m < 1) m = 1;
                let costThisMonth = (item.sum || 0) / m; totalExpenseThisMonth += costThisMonth;
                let isPrio = (i === 0);
                let cardHTML = '<div class="plan-card ' + (isPrio ? 'priority' : '') + '"><div class="row-main"><span style="' + (isPrio ? 'color:var(--accent-red)' : '') + '">' + (i+1) + '. ' + (item.name || 'Долг') + '</span><span>' + Math.round(costThisMonth).toLocaleString() + ' ₽</span></div><div class="row-sub">Срок рассрочки: ' + m + ' мес.</div></div>';

                if (item.source === 'adv') { advExpensesSum += costThisMonth; advListHTML += cardHTML; } 
                else { salExpensesSum += costThisMonth; salListHTML += cardHTML; }
            }

            let currentPiggyPercent = appData.piggyPercent; if (appData.targets.length > 0) currentPiggyPercent = appData.targets.reduce((acc, t) => acc + (t.pct || 0), 0);
            let salRemainder = salTotalIncome - salExpensesSum; if (salRemainder < 0) salRemainder = 0;
            let textRemainder = advTotalIncome - advExpensesSum; if (textRemainder < 0) textRemainder = 0;

            let salPiggySum = 0; let advPiggySum = 0;
            let totalRemainder = salRemainder + textRemainder;
            let globalPiggySum = (totalRemainder * currentPiggyPercent) / 100;

            for(let i=0; i<appData.targets.length; i++) {
                let t = appData.targets[i]; let part = Math.round((globalPiggySum * (t.pct || 0)) / (currentPiggyPercent || 1));
                let targetCardHTML = '<div class="plan-card" style="border-left: 4px solid var(--accent-amber)"><div class="row-main"><span style="color:var(--accent-amber)">🔒 Сейф: ' + (t.name || 'Цель') + '</span><span style="color:var(--accent-amber)">' + part.toLocaleString() + ' ₽</span></div><div class="row-sub">Накопления по цели (' + t.pct + '%)</div></div>';

                if (t.source === 'adv') { advPiggySum += part; advListHTML += targetCardHTML; } 
                else { salPiggySum += part; salListHTML += targetCardHTML; }
            }

            let salFreeMoney = salRemainder - salPiggySum; if (salFreeMoney < 0) salFreeMoney = 0;
            let advFreeMoney = textRemainder - advPiggySum; if (advFreeMoney < 0) advFreeMoney = 0;
            let totalFreeMoney = salFreeMoney + advFreeMoney;

            document.getElementById('freeMoneyText').innerText = Math.round(totalFreeMoney).toLocaleString('ru-RU') + ' ₽';

            let core = document.getElementById('coreCircle'); let waterLayer = document.getElementById('waterLayer');
            let totalGlobalIncome = salTotalIncome + advTotalIncome;
            if (totalGlobalIncome > 0) {
                let lifeRatio = totalFreeMoney / totalGlobalIncome;
                let scale = 0.65 + (lifeRatio * 0.35); if(core) core.style.transform = 'scale(' + scale + ')';
                let hPct = lifeRatio * 100; if (totalFreeMoney === 0 && (salExpensesSum + advExpensesSum) > 0) hPct = 8;
                if(waterLayer) waterLayer.style.height = hPct + '%';
            } else { if(core) core.style.transform = 'scale(0.65)'; if(waterLayer) waterLayer.style.height = '0%'; }

            let planList = document.getElementById('calendarPlanList'); planList.innerHTML = '';
            planList.innerHTML += '<div class="zone-header">Внести ' + appData.salaryDate + ' числа</div><div class="zone-list">' + (salListHTML || '<div class="plan-card"><div class="row-sub">Трат из зарплаты нет</div></div>') + '</div>';
            planList.innerHTML += '<div class="zone-header">Внести ' + appData.advanceDate + ' числа</div><div class="zone-list">' + (advListHTML || '<div class="plan-card"><div class="row-sub">Трат из аванса нет</div></div>') + '</div>';
        }
        calculateBudget();
    </script>
</body>
</html>
